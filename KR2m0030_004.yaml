body:
  text: 附刻臣諡類鈔後序國朝用漢制帝諡皆稱孝又襲唐故以字繁為貴要不離於天道文武間有惜孝字及武字者坤儀冠孝而聨稱奉慈遜嫡而均字或益之過而青宮之號羡於諸王或損之深而興宗之名幾於追廢意者禮時為大古人所以貴闕疑也洪武諸王不避荒厲之屬獻陵訪落有司奏賀銀之諡諭云與其惡諡孰若不諡惡諡之不行自賀侍郎始也楊東里云儒臣之諡始於胡晃菴而丘瓊臺則云始於姚道衍然文節易名實肇於洪武戊寅之歲則文臣之諡自王待制始也孝者行之首唐宋以降君臣同媺皇朝二百年與者僅居其一焉則陳僉督是也文以經緯為義非徒翰墨之工今詞林據而有之亦非令甲考之典制則魏南齋周恂如非經幄之産也其在近世則何椒丘黃定軒非摛繪之章也亦有發身詞林而不得文者以所重則劉求樂以私諱則陳安簡之屬也有諡在百年之後者宋濳溪劉誠意也有在數十年之後者于節菴嶽季方也有諡及其貤封之臣者常鄂公也有幸獲而數罷者李湯隂也有褒錫而屢更者曹萬鍾王泉坡之屬也有父子皆諡者鄒緝熙儀高密周松露王千之倪靜存王介菴白南宮耿青崖許靈寶林泉山孫一川有兄弟皆諡者彭可齋楊鏡川費湖東許函谷也有諡同于名而不能易者金忠之為忠襄林文俊之為文修也有姓諡皆同而不能易者馬行部馬西玄之同為文簡王威寧王石岡之同為襄敏也兹數者或相沿之舊而習以成章或法守之移而主者未覺或寵受之浮而求名不得或湮滅之後而欲蓋彌彰故總敘其概著於篇末其或未知者有所俟焉
