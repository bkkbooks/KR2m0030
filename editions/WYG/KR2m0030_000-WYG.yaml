  text: 欽定四庫全書史部十三
  hash: sha256:37715509aef7f3494164bc585a87d8624d4b4517ea757749fe3b4d88b8516ad7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0030_WYG_000-1a, image: WYG0651/WYG0651-0417a.png}
body:
  text: 明臣諡考政書類二儀制之屬提要臣等謹案明臣諡考二卷明鮑應鰲撰應鰲字山甫歙縣人萬厯乙未進士官至禮部祠祭司郎中是書載明代文武諸臣贈諡與欽定明史各𫝊俱符合首載各諡釋義為當時禮官體例而所列諸諡如某人諡某字皆分注當日定諡取義之文於下使觀者具知其所以然視他家所記較冇根據其前代諸臣如謝枋得之諡文節紀信文天祥之諡忠烈鄧文進之諡忠襄蘇緘之諡忠壯史或不載世所罕知亦頗賴此書以存卷末附萬厯三十一年至三十七年擬諡者三十人又三十八年至四十年擬諡者四人皆二諡並列蓋神宗荒怠奏章多不批答莫知進止故兩存也最後列訂誤一篇凡五十七人皆據官册以正野史文集之訛其中多有無諡而冒稱諡某者亦有字同義異美惡頓殊者或詭詞假借或傳寫舛謬外人無從而知非應鰲身為禮官親檢故籍不能一一釐正其于一代易名之典可云精核矣乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀明臣諡考原序諡典至重而議諡有専職唐宋以來皆太常博士掌之國朝則隸禮部而祠曹為之查覈品隲以與大宗伯衡量其予奪焉國初實浮於名錫諡者少合洪永兩朝凡五十餘年不過數十人要皆勲庸之選而文臣惟王文節胡文穆朱忠定三四人何斤斤也嘉靖四十五年間諡至一百八十一人萬厯紀年已幾與嘉靖等而所諡則嘉靖三分之一有竒近尚多議奪議改者其在嘉靖之世可知矣武臣之諡如黔國成國其人纍纍俱叨易名則幾以世矣爵有世諡亦有世乎勲舊苗裔非有它材行功能又非有年勞亦未可過徼余以故有所靳不予葢至冒忌開怨觸權力之怒而終不敢不為朝廷惜此名也若夫開平之諡及貤封雖以殊尤偉績然亦舛不經而當時禮臣不能裁有遺議焉文臣之諡文其所取義甚廣非僅僅詞章之謂也奈何以官私之然私一文諡而文反輕公一文諡而文轉重間者二十九人之諡余嘗佐少宗伯吳公末議其中追諡者大半要之皆當時峻節孤芳儒宗茂伐髙山可仰者也而尚有鴻碩遺于所議之外者亦甚夥焉盖先時當事者意有所欲格而以五年一請為例白虎通曰諡法地也法月也月已入有餘光耳目近則考據真取必于五年之後非通論也余與少宗伯吳公繼翁公俱破此例諸鴻碩名實純粹當予者輒議予其逺者則據台省䟽列及同省公揭搜入方册中倘品藻其確而甄别予之則累朝人物㡬亦大備余嘗謂考功程量於當年事權重而勸懲近祠祭品評於既往職司冷而鑒垂永豈非以諡哉署中故乏典籍紀載二百五十年來所諡諸臣漫無可考誠為闕事余故稽之國史證之閣籍旁及諸書集為臣諡彚考二卷存公署中新安鮑應鰲山甫題明臣諡考通用諡法釋義文經緯天地修德來逺勤學好問道德博聞慈惠愛民敏而好學愍民惠禮剛柔相濟忠信接禮修治班制施而中理武克定禍亂保大定功威强敵德剛强直理剛强以順闢土斥境折衝禦侮刑民克服成禮樂明具持盈守滿遂物之美通逺强立安民立政康安樂撫民温良好樂令民安樂淵源流通獻聰明睿智嚮惠内德智質有理懿柔克有光温柔贒善元體仁長民行義説民道德純一立建國都思能辨衆立義行德章法度大明敬愼髙明出言有文景耆意大圖由義而濟布義行剛宣施而不私善聞周達誠意見外聖善周聞明照臨四方任贒致逺獨見先識譖愬不行察色見情招集殊異昭明徳有功聖聞昭達容儀恭美昭德有勞正内外賔服恭卑以自牧尊賢貴義不懈為德敬事供上愛民弟長執禮御賔尊賢讓善執事堅固敬順事上正德美容既過能改責難於君莊嚴敬臨民威而不猛履正志和肅剛德克就執心决斷正已攝下穆布德執義中情見貌清避逺不義定安民大慮安民法古純行不爽大慮靜民簡一德不懈平易不訾正直無邪憲賞善罰奸博聞多能行善可紀敏應事有功端守禮執義敬夙夜警戒夙興恭事合善典法介執一不遷裕强學好問通物至能應事起而辨白外内貞復靖寛樂令終恭已鮮言柔德安衆贒行義合道明徳有成貞清白守節大慮克就不隱無屈孝慈惠愛親五宗安之大慮行節能養能恭繼志成事協時肇享秉徳不囬幹蠱用譽忠盛衰純固危身奉上推能盡忠亷方公正臨患不㤀國惠愛民好與柔質慈仁施勤無私和柔遠能邇不剛不柔號令民悦推賢讓能安好和不爭兆民寧頼質名實不爽忠正無邪靜柔德教衆烈安民有功秉德尊業禮奉義順則恭儉莊敬威賞功刑懲以刑服遠猛以彊果强義執正義一作毅猛以剛果勇率義共用義制事合宜見義能終先君後已取而不貪除去天地之害剛强毅果敢追補前過壯勝敵克亂屢征殺伐武而不遂勝敵志强叡圉克服死於原野兵甲亟作潔不汚不義節好亷自克謹行制度襄闢地有徳甲胄有勞因事有功愍在國逢難良小心敬事溫良好樂勤能修其官宻追補前過溫德性寛和榮寵禄光大順慈和徧服和比於理慈仁和民僖小心畏忌無過為僖質淵受諫小心恭慎純中正和粹果好力致勇修勤其世業好學近智顯行見中外恪敬共官次威容端嚴溫恭朝夕毅致果殺敵强而能斷善行不怠溫仁忠厚能紀國善思追悔前過念終知始謀慮不僭内外思索容寛裕溫柔懷慈仁短折失位而死隱懷情不盡不顯尸國隱拂不成見美堅長悼肆行勞祀未中早夭恐懼從處懋以德受官以功受賞愿弱無立志匡貞心大度比擇善而從翼愛民好治思慮深遠湯除殘去虐伐剛克為伐圉威德剛武桓辟土服逺克敵勤民辟土兼國慧柔質愛諫達質直好義疏中通理信守命共時出言可復慤行見中外表裏如一諡法增補釋義附武赴敵無避廖武愍釋義定追補前過梅榮定釋義忠殺身報國俞忠烈釋義推贒盡誠朱忠定夏忠靖胡忠安釋義推贒盡忠黄忠宣王忠肅釋義烈戎業有光俞忠烈釋義勇臨難不懼蔣武勇林忠勇呉壯勇劉威勇等十人釋義隱違拂不成石文隱郤隱懷釋義悼中年早夭李悼僖釋義愿柔無立志朱榮愿釋義桓壯而有力趙武桓釋義寧徐武寧無釋義崇陳崇武無釋義以上十一諡如武定忠烈勇隱悼愿桓之釋義皆諸家釋義所無者而寧崇二諡則併諸家諡法亦不載故附錄其凡以俟考或謂寧字為太祖取不殺之義而崇字則弇州别集以為能修其官曰崇不知何所考據
