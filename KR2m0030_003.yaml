body:
  text: 明臣諡考訂誤諸書所載諡號互有異同稍為訂正大略以國史閣籍為據而以諸書叅之間有國史與閣籍互異則並存以竢考武城侯王聰按正史諡威毅閣籍具存臣諡類鈔封爵考諡法考諡法通考俱誤作武毅元帥孫興祖按正史諡忠愍臣諡類鈔誤作武愍隆平侯張信正史諡恭僖諡法考諡法通考因之閣籍又作襄僖臣諡類鈔封爵考因之未詳孰是行省叅政趙徳勝正史諡武桓釋義具存臣諡類鈔封爵考誤作武莊樞密廖永安諡武愍正史作武閔愍閔古字通都督同知康茂才正史諡武義諡法通考封爵考誤作武襄都督僉事陳清按正史諡崇武臣諡類鈔誤作榮武武定侯郭英諡威襄諡法通考誤作武襄都督僉事贈廬江侯何徳按正史諡壯毅諡法考壯毅莊毅凡兩見當是重出而訛臣諡類鈔諡法通考作莊毅而别有何海贈廬江侯諡壯毅更謬行省叅政蔡㒨諡武襄臣諡類鈔諡法通考誤以㒨為遷泗國公耿再成正史諡武壯臣諡類鈔諡法考諡法通考俱作武莊越國公胡大海正史言行錄諡武莊諡法通考又作武壯按諡法武而不遂曰壯亦曰莊威而不猛曰莊亦曰壯二諡釋義並同未詳孰是副使孫興洪武中諡忠義見臣諡類鈔諡法通考按正史不載此事弇山堂集亦無之恐因都督府副使孫興祖而訛脱也宋學士濓追諡文憲諡法通考誤作文惠交趾平州知州何忠楊豫孫諡纂鄭司封類鈔俱諡忠節按正史忠止贈南寧府同知無諡正統中省臣姚夔以王禕例請卒報罷弇州集以為祠額之誤者近是墨侍郎麟按正史諡榮毅閣籍具存諡法通考誤作恭毅西寧侯諡忠順者按正史乃宋英閣籍具存晟之子也類鈔封爵考誤作晟諡法通考晟英凡兩見尤誤曾學士棨臣諡類鈔諡法通考俱諡襄敏按正史棨有贈無諡且不諡文而諡襄何居其誤無疑都督山雲按正史諡忠毅閣籍具存吾學編名臣言行錄誤作襄毅大政紀亦因之恭順侯吳克忠按正史諡壯勇閣本釋義具存臣諡類鈔封爵考誤作忠勇都督吳克勤按正史諡僖敏閣籍具存弇山堂集誤作僖愍修武伯沈榮按正史諡僖愍閣籍具存臣諡類鈔諡法通考誤作僖敏恭順侯吳瑾按正史諡武壯臣諡類鈔諡法考諡法通考俱作忠壯考李文達公所作神道碑亦同恐正史之誤南寕伯毛勝按正史諡莊毅閣籍具存臣諡類鈔諡法通考誤作忠壯武進伯朱冕按正史諡忠慤閣籍具存諡法通考作忠懿者誤寧晉伯劉聚按正史諡威勇閣籍具存吾學編臣諡類鈔誤作威武聶尚書賢按閣籍諡榮襄釋義具存類鈔誤作恭襄諡法考榮襄恭襄凡兩見尤誤劉尚書㒞按閣籍諡愍節釋義具存諡法考通考類鈔倒作節愍者誤原尚書傑尚無諡見弇山堂别集甚詳諡纂言行錄諡襄敏者大謬許侍郎彬按正史有贈無諡其子越請之不得張南園諡法鄭司封類鈔諡襄敏此誤也謝尚書一夔成化時有贈無諡正徳六年追諡文莊臣諡類鈔作襄敏諡法通考謂初諡襄敏後以子麟請改文莊並誤成國公朱輔按閣籍諡恭僖釋義具存類鈔作榮僖者誤熊尚書繡按正史諡莊簡閣籍具存吾學編作清簡者誤工侍贈尚書劉丙按閣籍諡恭襄釋義具存正史凡兩見恭襄襄敏前後互異諡法考亦兩存之恐誤也李尚書鉞按閣籍諡康簡高尚書友璣按閣籍諡襄簡正史皆作恭簡諡法考亦兩收之未詳孰是潘尚書鑑按閣籍諡襄毅釋義具存諡法考從史作襄敏毅敏文相近而訛恐當以閣籍為正惠安伯張偉按閣籍諡靖襄釋義具存正史又作康靖諡法考臣諡類鈔皆兩收之未詳孰是王尚書用汲按閣籍諡恭質釋義具存諡法通考誤作忠肅楊豫孫諡纂上蔡知縣霍恩諡節愍考正史恩有贈官而無諡臣諡類鈔諡法通考有孫學士賢王學士獻林學士文俱諡襄敏考正史閣籍皆無之此誤也弇州集有辨劉尚書采按閣籍諡端簡釋義具存諡法通考誤作端肅臣諡類鈔諡法通考載永順伯薛斌諡忠壯考正史閣籍封爵考順天志諡法考皆無之安順侯薛貴按正史閣籍諡忠壯釋義具存封爵考諡法通考作忠勇者誤王宗伯英臣諡類鈔諡法通考皆云初諡文安天順中改文忠考正史不言改諡閣籍亦無之不可為據臣諡類鈔諡法通考有都督梁來諡壯勇考正史閣籍俱無之弇州集亦不載疑即梁成之訛誤復收之耳張尚書潤按閣籍諡恭肅釋義具存名臣言行錄誤作恭簡臣諡類鈔諡法通考有翁尚書世賢諡襄敏按正史乃翁世資有贈無諡此必誤也嘉靖中都督諡忠愍者李淶無李深臣諡類鈔誤以淶為深諡法通考李淶凡兩見尤誤英國公贈太保張崙按閣籍諡榮和釋義具存正史又作莊和諡法考兩收之未詳孰是諡法通考臣諡類鈔有恭順侯吳允誠諡忠壯考正史閣籍皆無之弇州集亦不錄恐誤翁尚書萬達按閣籍諡襄敏釋義具存諡法通考一作襄毅者誤右都御史俞諫嘉靖三年八月二十六日贈太子太保諡莊襄閣籍具存正史載於是年九月原官贈諡俱同而作俞一鶴未詳何故大學士高穀按國史閣籍諡文義釋義具存大政紀誤作文毅李尚書敏按國史諡恭靖閣籍釋義具存大政紀誤作恭介禮部尚書傅瀚按國史閣籍諡文穆釋義具存大政紀誤作文慤明臣諡考訂誤
